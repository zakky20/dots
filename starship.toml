add_newline = false

[username]
style_user = "cyan bold"
style_root = "red bold"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = 'on [$hostname](bold purple) '
trim_at = "."
disabled = false

[character]                            # The name of the module we are configuring is "character"
success_symbol = "[´üí](bold cyan)"     # The "success_symbol" segment is being set to "Ô×£" with the color "bold green"
error_symbol = "[´Çì](bold red)"

[directory]
read_only = " ´Çú"
truncation_length = 10
truncate_to_repo = true # truncates directory to root folder if in github repo
style = "bold italic blue"

[cmd_duration]
min_time = 4
show_milliseconds = false
disabled = false
style = "bold italic red"

[aws]
symbol = "¯×¡  "

[conda]
symbol = "´äî "

[dart]
symbol = "¯×ÿ "

#[directory]
#read_only = " ´á¢"

[docker_context]
symbol = "´îê "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

